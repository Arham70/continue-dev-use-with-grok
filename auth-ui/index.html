<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Advanced Authentication UI - Modern login, registration, and password management">
  <meta name="theme-color" content="#6366f1">
  
  <title>Login | Auth UI</title>
  
  <!-- Preconnect for fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  
  <!-- Google Fonts - Inter -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Stylesheets -->
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/login.css">
  <link rel="stylesheet" href="css/register.css">
  <link rel="stylesheet" href="css/forgot-password.css">
  <link rel="stylesheet" href="css/mfa.css">
  <link rel="stylesheet" href="css/responsive.css">
  
  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%236366f1' rx='20' width='100' height='100'/><text x='50%' y='50%' dominant-baseline='central' text-anchor='middle' font-size='60' fill='white'>🔐</text></svg>">
</head>
<body>
  <!-- Application Root -->
  <div id="app">
    <!-- Content rendered by JavaScript -->
    <div class="login-container">
      <div class="login-card">
        <div class="login-header" style="text-align: center; padding: 60px 40px;">
          <div class="login-logo" style="margin: 0 auto 20px;">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
          </div>
          <h1 class="login-title">Loading...</h1>
          <p class="login-subtitle">Please wait while we load the application</p>
        </div>
      </div>
    </div>
  </div>
  
  <!-- Scripts -->
    <script src="js/utils.js"></script>
    <script src="js/login.js"></script>
    <script src="js/register.js"></script>
    <script src="js/forgot-password.js"></script>
    <script src="js/mfa.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
